<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Wearable Sensor Analysis Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1220; color:#e5e7eb; font-family:Arial; text-align:center; }
.box { width:800px; margin:30px auto; background:#111827; padding:20px; border-radius:14px; }
.row { margin:10px 0; }
select, button { padding:8px; margin:5px; }
canvas { background:white; border-radius:8px; margin-top:20px; }
.badge { display:inline-block; padding:4px 8px; border-radius:6px; margin-left:8px; }
.ok { background:#065f46; }
.warn { background:#7c2d12; }
</style>
</head>

<body>
<div class="box">
<h2>Wearable Sensor Analysis Dashboard Pro+</h2>

<div class="row">
<input type="file" id="fileInput">
</div>

<div class="row">
<select id="sensor">
  <option value="acc">ACC（加速度）</option>
  <option value="ppg">PPG（心率）</option>
  <option value="emg">EMG（肌电）</option>
  <option value="gsr">GSR（皮电）</option>
</select>

<select id="mode">
  <option value="raw">原始信号</option>
  <option value="smooth">平滑处理</option>
  <option value="fft">FFT频谱</option>
</select>
</div>

<button onclick="analyze()">开始分析</button>

<canvas id="chart"></canvas>

<p id="result"></p >
</div>

<script>
let rawData = [];
let chart;

document.getElementById("fileInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
        rawData = event.target.result
            .split("\n")
            .map(line => line.split(",").map(Number))
            .filter(row => !isNaN(row[1]));
    };
    reader.readAsText(file);
});

// 平滑
function smooth(data){
    let res = [];
    for(let i=1;i<data.length-1;i++){
        res.push((data[i-1]+data[i]+data[i+1])/3);
    }
    return res;
}

// FFT
function fft(signal){
    let N = signal.length;
    let mag = [];
    for(let k=0;k<N/2;k++){
        let real=0, imag=0;
        for(let n=0;n<N;n++){
            let angle = 2*Math.PI*k*n/N;
            real += signal[n]*Math.cos(angle);
            imag -= signal[n]*Math.sin(angle);
        }
        mag.push(Math.sqrt(real*real+imag*imag));
    }
    return mag;
}

// 主频
function peakFrequency(data){
    let max = Math.max(...data);
    return data.indexOf(max);
}

// 异常检测
function detectAnomaly(data){
    let avg = data.reduce((a,b)=>a+b,0)/data.length;
    let variance = data.reduce((a,b)=>a+(b-avg)**2,0)/data.length;
    let std = Math.sqrt(variance);

    if(std > avg*0.5){
        return "异常波动";
    }
    return "正常";
}

function analyze(){
    if(rawData.length === 0){
        alert("请上传CSV");
        return;
    }

    let x = rawData.map(r=>r[0]);
    let y = rawData.map(r=>r[1]);

    let mode = document.getElementById("mode").value;
    let sensor = document.getElementById("sensor").value;

    if(mode==="smooth"){
        y = smooth(y);
        x = x.slice(1,-1);
    }

    if(mode==="fft"){
        y = fft(y);
        x = y.map((_,i)=>i);
    }

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:'line',
        data:{
            labels:x,
            datasets:[{
                label: sensor.toUpperCase()+" - "+mode,
                data:y
            }]
        }
    });

    // 分析
    let avg = y.reduce((a,b)=>a+b,0)/y.length;
    let anomaly = detectAnomaly(y);

    let resultText = `平均值: ${avg.toFixed(2)} | 状态: ${anomaly}`;

    if(mode==="fft"){
        let peak = peakFrequency(y);
        resultText += ` | 主频: ${peak} Hz`;
    }

    let badge = anomaly==="正常" 
        ? '<span class="badge ok">NORMAL</span>' 
        : '<span class="badge warn">WARNING</span>';

    document.getElementById("result").innerHTML =
        resultText + " " + badge;
}
</script>

</body>
</html>
