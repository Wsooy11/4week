<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Image Analyzer</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        .box {
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Image Analyzer</h2>

    <input type="file" id="upload"><br>
    < img id="preview" src=""><br>

    <input type="text" id="command" placeholder="输入指令 (例如: 描述图片)">
    <br>
    <button onclick="analyze()">Analyze</button>

    <p id="result"></p >
</div>

<script>
let imageElement = document.getElementById("preview");

document.getElementById("upload").onchange = function(e) {
    let file = e.target.files[0];
    imageElement.src = URL.createObjectURL(file);
};

function analyze() {
    let cmd = document.getElementById("command").value;
    let result = document.getElementById("result");

    if (!imageElement.src) {
        result.innerText = "请先上传图片";
        return;
    }

    if (cmd.includes("描述")) {
        result.innerText = "这是一张你上传的图片（模拟分析）";
    } else if (cmd.includes("颜色")) {
        result.innerText = "图片包含多种颜色（模拟结果）";
    } else {
        result.innerText = "暂不支持该指令";
    }
}
</script>

</body>
</html>
